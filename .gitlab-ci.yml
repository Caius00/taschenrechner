# GitLab CI/CD Pipeline: verpackt die vorhandene Taschenrechner.jar in ein signiertes MSIX
# Umgebung: Windows (GitLab.com SaaS Windows Runner)
#
# Die JAR wird NICHT neu gebaut - es wird die im Repo liegende Taschenrechner.jar genutzt.
#
# Ablauf:
#   1. jpackage (vorinstalliertes JDK) macht aus der JAR ein natives .exe + Runtime
#   2. winapp CLI als portables ZIP laden (winget ist auf dem Runner nicht verfuegbar)
#   3. Package.appxmanifest erzeugen + Publisher auf CN=Taschenrechner setzen
#   4. Selbstsigniertes Zertifikat erzeugen (CurrentUser-Store, KEIN Admin noetig)
#      -> devcert.pfx (zum Signieren) + devcert.cer (zum Vertrauen/Installieren)
#   5. MSIX bauen + signieren (winapp package/pack)
#
# Downloads (Artefakte): Taschenrechner*.msix  und  devcert.cer
# Installieren beim Nutzer: devcert.cer in "Vertrauenswuerdige Personen" importieren,
#   dann  Add-AppxPackage .\Taschenrechner*.msix

stages:
  - package

build-msix-windows:
  stage: package
  tags:
    - saas-windows-medium-amd64
  variables:
    APP_NAME: "Taschenrechner"
    PUBLISHER: "CN=Taschenrechner"
    CERT_PW: "Taschenrechner!2026"
    CORRETTO_URL: "https://corretto.aws/downloads/resources/26.0.1.8.1/amazon-corretto-26.0.1.8.1-windows-x64-jdk.zip"
    WINAPP_URL: "https://github.com/microsoft/winappCli/releases/download/v0.4.0/winappcli-x64.zip"
  cache:
    key: "corretto-26.0.1.8.1"
    paths:
      - jdk/
  script:
    # --- 0) Amazon Corretto 26 laden (nur beim ersten Lauf, danach aus dem CI-Cache) ---
    - if (-not (Test-Path jdk)) { Invoke-WebRequest -Uri $env:CORRETTO_URL -OutFile corretto.zip; Expand-Archive -Path corretto.zip -DestinationPath jdk -Force }
    - $javaHome = (Get-ChildItem jdk -Directory | Select-Object -First 1).FullName
    - $env:JAVA_HOME = $javaHome
    - $env:PATH = "$javaHome\bin;$env:PATH"
    - java -version
    - jpackage --version

    # --- 1) Aus der vorhandenen JAR ein natives .exe mit Runtime erzeugen ---
    - New-Item -ItemType Directory -Force -Path input | Out-Null
    - Copy-Item Taschenrechner.jar input\
    - jpackage --type app-image --name $env:APP_NAME --input input --main-jar Taschenrechner.jar --main-class Main --dest dist
    # Ergebnis: dist\Taschenrechner\Taschenrechner.exe (+ runtime\, app\)

    # --- 2) winapp CLI als portables ZIP holen (kein winget noetig) ---
    - Invoke-WebRequest -Uri $env:WINAPP_URL -OutFile winappcli.zip
    - Expand-Archive -Path winappcli.zip -DestinationPath winappcli -Force
    - $winapp = Join-Path (Resolve-Path .\winappcli) 'winapp.exe'
    - '& $winapp --version'
    # Verfuegbare Befehle ins Log schreiben (Hilfe bei kuenftigem Debugging)
    - '& $winapp --help'

    # --- 3) Manifest erzeugen und Publisher setzen ---
    - Push-Location dist\$env:APP_NAME
    - '& $winapp manifest generate --executable ".\$env:APP_NAME.exe"'
    - Pop-Location
    - $manifestPath = "dist\$env:APP_NAME\Package.appxmanifest"
    - '[xml]$m = Get-Content $manifestPath'
    - $m.Package.Identity.Publisher = $env:PUBLISHER
    - $m.Save((Resolve-Path $manifestPath))

    # --- 4) Selbstsigniertes Zertifikat erzeugen (im RAM, kein Zertifikatspeicher) ---
    # Umgeht NTE_PERM auf dem Runner (Dienst ohne Profil). Siehe ci/make-cert.ps1.
    - Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
    - .\ci\make-cert.ps1 -Subject $env:PUBLISHER -Password $env:CERT_PW

    # --- 5) MSIX bauen und signieren (--verbose fuer Fehlerdetails) ---
    - '& $winapp package ".\dist\$env:APP_NAME" --cert ".\devcert.pfx" --cert-password $env:CERT_PW --verbose'

    # --- Kontrolle: was wurde erzeugt? ---
    - Get-ChildItem -Path . -Include *.msix,*.cer -Recurse | Select-Object FullName
  artifacts:
    name: "$APP_NAME-msix-$CI_COMMIT_SHORT_SHA"
    paths:
      - "**/*.msix"
      - "*.msix"
      - devcert.cer
    expire_in: 4 weeks
