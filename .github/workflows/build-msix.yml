name: Build signed MSIX

# Zwei getrennte Stufen (Jobs):
#   1) build-exe      -> baut NUR die native Taschenrechner.exe (jpackage) und
#                        reicht das app-image als Artefakt weiter
#   2) package-sign   -> haengt per 'needs' an build-exe, macht NUR Paketierung
#                        (winapp) + Signierung + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: Taschenrechner

jobs:
  # ---------- Stufe 1: nur die native EXE ----------
  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Corretto 26
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '26'

      - name: Build native .exe (jpackage)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path input | Out-Null
          Copy-Item Taschenrechner.jar input\
          jpackage --type app-image --name $env:APP_NAME --input input `
            --main-jar Taschenrechner.jar --main-class Main --dest dist `
            --icon icon\calculator.ico

      - name: Upload app-image (exe + Runtime)
        uses: actions/upload-artifact@v4
        with:
          name: app-image
          path: dist
          if-no-files-found: error

  # ---------- Stufe 2: Paketierung + Signierung ----------
  package-sign:
    needs: build-exe
    runs-on: windows-latest
    permissions:
      contents: write        # noetig, um ein Release zu erstellen/aktualisieren
    env:
      CERT_PW: "Taschenrechner!2026"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download app-image (exe + Runtime aus Stufe 1)
        uses: actions/download-artifact@v4
        with:
          name: app-image
          path: dist

      - name: Install winapp CLI (winget)
        shell: pwsh
        run: |
          winget install microsoft.winappcli --source winget `
            --accept-source-agreements --accept-package-agreements --disable-interactivity
          winapp --version

      - name: Generate manifest (Kachel-Icons aus calculator.png)
        shell: pwsh
        run: |
          $logo = (Resolve-Path ".\icon\calculator.png").Path
          Push-Location "dist\$env:APP_NAME"
          winapp manifest generate --executable ".\$($env:APP_NAME).exe" --logo-path $logo
          Pop-Location

      - name: Set publisher in manifest (statt "Unknown")
        shell: pwsh
        run: |
          $manifestPath = "dist\$($env:APP_NAME)\Package.appxmanifest"
          [xml]$m = Get-Content $manifestPath
          $m.Package.Identity.Publisher = "CN=Taschenrechner"
          $m.Package.Properties.PublisherDisplayName = "Taschenrechner"
          $m.Save((Resolve-Path $manifestPath))
          Write-Host "Publisher gesetzt: CN=Taschenrechner / Taschenrechner"

      - name: Create signing certificate (winapp cert generate)
        shell: pwsh
        run: |
          winapp cert generate `
            --manifest "dist\$($env:APP_NAME)\Package.appxmanifest" `
            --password $env:CERT_PW `
            --output ".\devcert.pfx" `
            --export-cer `
            --if-exists overwrite

      - name: Package + sign MSIX
        shell: pwsh
        run: |
          winapp package ".\dist\$($env:APP_NAME)" --output ".\$($env:APP_NAME).msix" `
            --cert ".\devcert.pfx" --cert-password $env:CERT_PW
          if ($LASTEXITCODE -ne 0) { throw "winapp package fehlgeschlagen (exit $LASTEXITCODE)" }
          Get-ChildItem *.msix, *.cer | Select-Object Name, Length

      - name: MSIX + Zertifikat fuer Test-Stufe weiterreichen
        uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: |
            ${{ env.APP_NAME }}.msix
            devcert.cer
          if-no-files-found: error

      # Beide Dateien einzeln (ohne ZIP) als Release-Assets veroeffentlichen
      - name: Publish MSIX + Zertifikat als Release (ohne ZIP)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "latest"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Taschenrechner (neueste Version)" `
              --notes "Automatisch gebautes, signiertes MSIX + oeffentliches Zertifikat (devcert.cer)."
          }
          gh release upload $tag ".\$($env:APP_NAME).msix" ".\devcert.cer" --clobber

  # ---------- Stufe 3: Test auf frischer VM ----------
  test-msix:
    needs: package-sign
    runs-on: windows-latest      # frische VM
    steps:
      - name: App-Image (aus Stufe 1) laden
        uses: actions/download-artifact@v4
        with:
          name: app-image
          path: dist

      - name: Funktionstest headless (gebuendeltes Corretto + Rechenlogik)
        shell: pwsh
        run: |
          $java = (Resolve-Path "dist\$($env:APP_NAME)\runtime\bin\java.exe").Path
          $jar  = (Resolve-Path "dist\$($env:APP_NAME)\app\$($env:APP_NAME).jar").Path
          Write-Host "java: $java"
          Write-Host "jar:  $jar"
          & $java -cp $jar Main --selftest
          if ($LASTEXITCODE -ne 0) { throw "Selbsttest fehlgeschlagen (exit $LASTEXITCODE)" }

      - name: MSIX-Paket (aus Stufe 2) laden
        uses: actions/download-artifact@v4
        with:
          name: msix-package
          path: pkg

      - name: Zertifikat vertrauen + MSIX installieren
        shell: pwsh
        run: |
          Import-Certificate -FilePath "pkg\devcert.cer" -CertStoreLocation Cert:\LocalMachine\TrustedPeople | Out-Null
          Add-AppxPackage -Path "pkg\$($env:APP_NAME).msix"
          $pkg = Get-AppxPackage "*$($env:APP_NAME)*"
          if (-not $pkg) { throw "MSIX wurde nicht installiert" }
          Write-Host "OK installiert: $($pkg.PackageFullName)"
          Write-Host "  Publisher: $($pkg.Publisher)"

      - name: Installierte App starten und pruefen, dass sie laeuft
        shell: pwsh
        run: |
          $pkg = Get-AppxPackage "*$($env:APP_NAME)*"
          $appId = (Get-AppxPackageManifest $pkg).Package.Applications.Application.Id
          Write-Host "Starte: shell:AppsFolder\$($pkg.PackageFamilyName)!$appId"
          Start-Process "shell:AppsFolder\$($pkg.PackageFamilyName)!$appId"
          # bis zu 20s auf den Prozess warten
          $proc = $null
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 1
            $proc = Get-Process $env:APP_NAME -ErrorAction SilentlyContinue
            if ($proc) { break }
          }
          if (-not $proc) { throw "App-Prozess '$($env:APP_NAME)' wurde nach dem Start nicht gefunden" }
          # kurz laufen lassen und pruefen, dass sie nicht sofort abstuerzt
          Start-Sleep -Seconds 3
          if (-not (Get-Process -Id $proc.Id -ErrorAction SilentlyContinue)) {
            throw "App ist direkt nach dem Start abgestuerzt"
          }
          Write-Host "App laeuft (PID $($proc.Id)) - Start-Test bestanden."
          Stop-Process -Id $proc.Id -Force

      - name: Aufraeumen (Paket entfernen)
        if: always()
        shell: pwsh
        run: Get-AppxPackage "*$($env:APP_NAME)*" | Remove-AppxPackage -ErrorAction SilentlyContinue
