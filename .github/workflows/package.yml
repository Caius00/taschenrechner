name: Package apps as MSIX

# Verpackt Windows-Programme automatisch zu signierten MSIX-Paketen.
#
# Zwei Wege, pro Ordner unter apps/<Name>/ :
#   A) Dateien committen   -> lege die .exe + zugehoerige Dateien direkt rein
#                             (nur fuer KLEINE Apps, GitHub-Limit 100 MB/Datei).
#   B) URL (fuer grosse Apps) -> lege NUR eine Datei 'app.url' rein mit dem
#                             Download-Link. Die Pipeline laedt+entpackt zur Build-Zeit.
#
# Alle Apps werden mit EINEM gemeinsamen Zertifikat signiert.
# Ergebnis: pro App ein <Name>.msix + EIN gemeinsames certificate.cer im Release 'latest'.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CERT_PW: "Package!2026"        # PFX-Passwort (Wegwerf, kein echtes Geheimnis)
  PUBLISHER: "CN=MSIXPackager"   # gemeinsamer Publisher = Subject des einen Zertifikats

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: winapp CLI installieren (winget)
        shell: pwsh
        run: |
          winget install microsoft.winappcli --source winget `
            --accept-source-agreements --accept-package-agreements --disable-interactivity
          winapp --version

      - name: Alle Apps unter apps/ verpacken + signieren
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root     = (Get-Location).Path
          $outPath  = (New-Item -ItemType Directory -Force -Path (Join-Path $root "output")).FullName
          $work     = (New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP "work")).FullName
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"

          $appDirs = @(Get-ChildItem -Path apps -Directory -ErrorAction SilentlyContinue)
          if ($appDirs.Count -eq 0) { Write-Host "Keine App-Ordner unter apps/."; return }

          # ---- EIN gemeinsames Zertifikat fuer ALLE Apps ----
          $pfx = Join-Path $outPath "certificate.pfx"
          winapp cert generate --publisher $env:PUBLISHER --password $env:CERT_PW `
            --output $pfx --export-cer --if-exists overwrite
          if ($LASTEXITCODE -ne 0) { throw "cert generate (gemeinsames Zertifikat)" }
          Write-Host "Gemeinsames Zertifikat: $env:PUBLISHER"

          $signtool = $null
          $failed   = @()
          foreach ($dir in $appDirs) {
            $name = $dir.Name
            Write-Host "===== App '$name' ====="
            try {
              $exeHint = $null
              $urlFile = Join-Path $dir.FullName "app.url"

              if (Test-Path $urlFile) {
                # ---- Modus B: per URL laden ----
                $cfg = @{}
                foreach ($line in (Get-Content $urlFile)) {
                  $t = $line.Trim()
                  if ($t -eq "" -or $t.StartsWith("#")) { continue }
                  if ($t -match '^\s*(\w+)\s*=\s*(.+)$') { $cfg[$matches[1].ToLower()] = $matches[2].Trim() }
                  elseif (-not $cfg.ContainsKey('url'))  { $cfg['url'] = $t }
                }
                $url = $cfg['url']
                if (-not $url) { throw "app.url ohne 'url'" }
                $exeHint = $cfg['exe']
                Write-Host "URL: $url"

                $packDir = Join-Path $work $name
                Remove-Item $packDir -Recurse -Force -ErrorAction SilentlyContinue
                New-Item -ItemType Directory -Force -Path $packDir | Out-Null
                $file = Join-Path $work ("dl_" + [IO.Path]::GetFileName($url.Split('?')[0]))
                Invoke-WebRequest -Uri $url -OutFile $file
                switch ([IO.Path]::GetExtension($file).ToLower()) {
                  ".zip" { Expand-Archive -Path $file -DestinationPath $packDir -Force }
                  ".7z"  { & $sevenZip x $file "-o$packDir" -y | Out-Null }
                  ".exe" { Copy-Item $file (Join-Path $packDir ([IO.Path]::GetFileName($file))) }
                  default { throw "Unbekannter Download-Typ ($file)" }
                }
              }
              else {
                $packDir = $dir.FullName   # Modus A
              }

              # Einstiegs-exe finden (Hint bevorzugt); verpackt wird der ORDNER DER EXE
              $exe = $null
              if ($exeHint) { $exe = Get-Item (Join-Path $packDir $exeHint) -ErrorAction SilentlyContinue }
              if (-not $exe) { $exe = Get-ChildItem -Path $packDir -Filter *.exe | Select-Object -First 1 }
              if (-not $exe) { $exe = Get-ChildItem -Path $packDir -Recurse -Filter *.exe | Select-Object -First 1 }
              if (-not $exe) { throw "keine .exe gefunden" }
              $appRoot = $exe.Directory.FullName
              Write-Host "exe: $($exe.Name)  (Ordner: $appRoot)"

              Push-Location $appRoot
              try {
                # 1) Manifest (Icon aus exe), 2) gemeinsamen Publisher setzen
                winapp manifest generate --executable (".\" + $exe.Name)
                if ($LASTEXITCODE -ne 0) { throw "manifest generate" }
                [xml]$m = Get-Content "Package.appxmanifest"
                $m.Package.Identity.Publisher = $env:PUBLISHER
                $m.Package.Properties.PublisherDisplayName = $name
                $m.Save((Resolve-Path "Package.appxmanifest").Path)

                # 3) MSIX UNSIGNIERT bauen
                $msixOut = Join-Path $outPath "$name.msix"
                winapp package "." --output $msixOut
                if ($LASTEXITCODE -ne 0) { throw "package" }

                # 4) 64-bit signtool suchen (einmalig) und mit dem GEMEINSAMEN Zertifikat signieren
                if (-not $signtool) {
                  foreach ($r in @("$HOME\.winapp","$env:LOCALAPPDATA\.winapp","$env:ProgramFiles\Windows Kits","${env:ProgramFiles(x86)}\Windows Kits")) {
                    if (Test-Path $r) {
                      $cands = Get-ChildItem $r -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue
                      $x64 = $cands | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
                      if ($x64)   { $signtool = $x64.FullName; break }
                      if ($cands) { $signtool = ($cands | Select-Object -First 1).FullName; break }
                    }
                  }
                  Write-Host "signtool: $signtool"
                }
                if (-not $signtool) { throw "signtool.exe nicht gefunden" }
                & $signtool sign /fd SHA256 /f $pfx /p $env:CERT_PW $msixOut
                if ($LASTEXITCODE -ne 0) { throw "signtool (exit $LASTEXITCODE)" }
                Write-Host "OK -> $name.msix"
              }
              finally { Pop-Location }
            }
            catch {
              Write-Warning "App '$name' fehlgeschlagen: $_"
              $failed += $name
            }
          }

          # gemeinsames certificate.cer behalten, private .pfx entfernen
          Remove-Item (Join-Path $outPath "*.pfx") -ErrorAction SilentlyContinue
          Write-Host "=== Ergebnis ==="
          Get-ChildItem $outPath | Select-Object Name, Length
          if ($failed.Count -gt 0) { throw "Fehlgeschlagene Apps: $($failed -join ', ')" }

      - name: Pakete als Release speichern
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msix = @(Get-ChildItem output\*.msix -ErrorAction SilentlyContinue)
          if ($msix.Count -eq 0) { Write-Host "Keine MSIX erzeugt - kein Release."; return }
          $tag = "latest"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "MSIX-Pakete (neueste Version)" `
              --notes "Automatisch verpackte & signierte MSIX-Pakete. Alle mit EINEM Zertifikat signiert: einmal certificate.cer vertrauen, dann jede <Name>.msix installieren."
          }
          Get-ChildItem output\*.msix, output\*.cer | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
          Write-Host "Release 'latest' aktualisiert."
